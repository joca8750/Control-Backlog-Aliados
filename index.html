<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Regional - Alta Visibilidad</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --rojo: #D32F2F; --gris-fondo: #F4F7F6; --texto: #212121; --borde: #dfe6e9; --azul: #1976D2; --verde: #2e7d32; }
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif !important; }
        body { background: var(--gris-fondo); margin: 0; padding: 10px; color: var(--texto); overflow-x: hidden; }
        
        h1 { text-transform: uppercase; color: var(--rojo); text-align: center; font-size: 0.8rem; margin: 2px 0; font-weight: 700; }
        h2 { color: var(--rojo); font-size: 0.55rem; margin: 0 0 3px 0; text-transform: uppercase; text-align: center; font-weight: 700; }

        /* TOOLBAR ULTRA COMPACTA */
        .toolbar { background: white; padding: 5px; border-radius: 6px; margin-bottom: 5px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .filter-group { display: flex; flex-direction: column; gap: 1px; flex-grow: 1; min-width: 75px; }
        label { font-size: 0.4rem; color: #777; text-transform: uppercase; font-weight: 700; padding-left: 2px; }
        select { padding: 1px 2px; border-radius: 3px; border: 1px solid var(--borde); font-size: 0.55rem; height: 20px; background: #fff; cursor: pointer; }

        .btn-container { display: flex; gap: 3px; width: 100%; justify-content: center; margin-top: 2px; }
        .btn { padding: 3px 6px; border-radius: 3px; border: none; color: white; text-transform: uppercase; font-size: 0.48rem; cursor: pointer; font-weight: 700; }
        .btn-excel { background: var(--verde); } .btn-search { background: var(--azul); } .btn-return { background: #34495e; }

        /* KPI MINIMIZADOS */
        .resumen-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 5px; }
        .card { background: white; padding: 2px 1px; border-radius: 4px; border-top: 2px solid var(--rojo); text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .card h3 { color: #888; font-size: 0.4rem; margin: 0; text-transform: uppercase; font-weight: 700; }
        .card p { font-size: 0.7rem; color: var(--rojo); margin: 0; font-weight: 700; line-height: 1.1; }

        /* GRID DASHBOARD */
        .dashboard-grid { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .chart-container, .tabla-critica, .container-imagen { background: white; padding: 5px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .chart-box { height: 150px; position: relative; }

        /* EFECTO ZOOM AL PASAR EL CURSOR SOBRE LAS GRÁFICAS */
        .chart-container:hover {
            transform: scale(1.15); /* Aumenta el tamaño un 15% */
            z-index: 100; /* Lo pone por encima de todo */
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .container-imagen { display: flex; justify-content: center; align-items: center; overflow: hidden; height: 100%; }
        .container-imagen img { max-width: 100%; max-height: 100%; border-radius: 4px; }

        /* TABLA AJUSTADA */
        .table-wrapper { overflow-x: auto; max-height: 480px; border-radius: 4px; border: 1px solid #eee; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        th { border-bottom: 1px solid var(--rojo); padding: 4px 2px; text-align: left; font-size: 0.5rem; color: #666; position: sticky; top: 0; background: #fdfdfd; z-index: 10; text-transform: uppercase; }
        td { padding: 3px 2px; border-bottom: 1px solid #f1f2f6; font-size: 0.55rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr.selected td { background-color: #FFEBEE !important; color: var(--rojo); font-weight: 700; }

        @media (min-width: 1024px) {
            body { padding: 5px 10px; height: 100vh; overflow: hidden; }
            .resumen-container { grid-template-columns: repeat(5, 1fr); }
            .dashboard-grid {
                display: grid;
                grid-template-columns: 1fr 1.1fr 1fr;
                grid-template-rows: 180px 1fr;
                height: calc(100vh - 150px);
                gap: 8px;
            }
            .tabla-critica { grid-column: 1 / 4; grid-row: 2; height: 100%; }
        }
    </style>
</head>
<body>

    <h1>Backlog Regional</h1>

    <div class="toolbar">
        <div class="filter-group"><label>Reg</label><select id="f-regional" onchange="registrarYFiltrar()"></select></div>
        <div class="filter-group"><label>Depto</label><select id="f-depto" onchange="registrarYFiltrar()"></select></div>
        <div class="filter-group"><label>Aliado</label><select id="f-aliado" onchange="registrarYFiltrar()"></select></div>
        <div class="filter-group"><label>Topol</label><select id="f-topologia" onchange="registrarYFiltrar()"></select></div>
        <div class="filter-group"><label>Op</label><select id="f-tipo-operacion" onchange="registrarYFiltrar()"></select></div>
        <div class="btn-container">
            <button class="btn btn-search" onclick="buscarPorID()">🔍 ID</button>
            <button class="btn btn-excel" onclick="exportarExcel()">📥 Excel</button>
            <button class="btn btn-return" id="btn-return" onclick="pasoAtras()" disabled>↺ Return</button>
        </div>
    </div>

    <div class="resumen-container">
        <div class="card"><h3>Sitios</h3><p id="t-sitios">0</p></div>
        <div class="card"><h3>Disp.</h3><p id="d-global">0%</p></div>
        <div class="card"><h3>Falla</h3><p id="t-falla">0</p></div>
        <div class="card"><h3>Prom Hrs</h3><p id="m-promedio">0h</p></div>
        <div class="card"><h3>Prom Días</h3><p id="d-promedio">0d</p></div>
    </div>

    <div class="dashboard-grid">
        <div class="chart-container">
            <h2>ESTADO CD</h2>
            <div class="chart-box"><canvas id="cEstadoOp"></canvas></div>
        </div>
        <div class="container-imagen">
            <img src="https://raw.githubusercontent.com/joca8750/Control-Backlog-Aliados/main/Captura%20de%20pantalla%202026-02-24%20155002.jpg" alt="Info">
        </div>
        <div class="chart-container">
            <h2>DÍAS DE AFECTACIÓN</h2>
            <div class="chart-box"><canvas id="cDiasAfectacion"></canvas></div>
        </div>
        <div class="tabla-critica">
            <h2 id="table-title">Backlog Activo</h2>
            <div class="table-wrapper">
                <table id="tSitios">
                    <thead><tr><th>ID</th><th>ALIADO</th><th style="text-align:right;">DÍAS</th><th style="text-align:right;">HORAS</th><th>STOPPER</th><th>OT</th><th>PERFIL</th></tr></thead>
                    <tbody id="b-tabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Registramos el plugin globalmente
        Chart.register(ChartDataLabels);

        let dataFull = []; let chartEstado, chartDias; let selectedId = null; let historial = []; 
        let currentEstadoFilter = null; let currentDayFilter = null;
        const filtrosIds = {'f-regional': 'REGIONAL', 'f-depto': 'DEPARTAMENTO', 'f-aliado': 'ALIADO', 'f-topologia': 'TOPOLOGIA', 'f-tipo-operacion': 'PROYECTO'};

        async function init() {
            try {
                const res = await fetch('./data_ben.json');
                if (!res.ok) throw new Error("Error cargando JSON");
                dataFull = await res.json();
                actualizarSelectores(); aplicarCambios(false);
            } catch (e) {
                console.error(e);
                document.getElementById('table-title').innerText = "Error cargando data_ben.json. Asegúrate de usar un servidor local.";
            }
        }

        function registrarEstado() {
            const estado = { filtros: {}, selectedId, currentEstadoFilter, currentDayFilter };
            for (let id in filtrosIds) estado.filtros[id] = document.getElementById(id).value;
            historial.push(JSON.stringify(estado));
            document.getElementById('btn-return').disabled = false;
        }

        function registrarYFiltrar() { registrarEstado(); currentEstadoFilter = null; currentDayFilter = null; selectedId = null; aplicarCambios(false); }

        function aplicarCambios(conReg = true) {
            if (conReg) registrarEstado();
            const sel = {}; for (let id in filtrosIds) sel[filtrosIds[id]] = document.getElementById(id).value;
            let filtered = dataFull.filter(i => {
                if (sel.REGIONAL !== 'todos' && i.REGIONAL !== sel.REGIONAL) return false;
                if (sel.DEPARTAMENTO !== 'todos' && i.DEPARTAMENTO !== sel.DEPARTAMENTO) return false;
                if (sel.ALIADO !== 'todos' && i.ALIADO !== sel.ALIADO) return false;
                if (currentEstadoFilter && i.ESTADO_OP !== currentEstadoFilter) return false;
                if (currentDayFilter) {
                    const d = i.mttr_horas / 24;
                    if (currentDayFilter === '>60d' && d <= 60) return false;
                    if (currentDayFilter === '45-60d' && (d < 45 || d > 60)) return false;
                    if (currentDayFilter === '30-45d' && (d < 30 || d > 45)) return false;
                    if (currentDayFilter === '15-30d' && (d < 15 || d > 30)) return false;
                    if (currentDayFilter === '5-15d' && (d < 5 || d > 15)) return false;
                    if (currentDayFilter === '<5d' && d > 5) return false;
                }
                return i.tickets > 0;
            });
            if (selectedId) filtered = filtered.filter(i => i.ID == selectedId);
            actualizarSelectores(); render(filtered);
        }

        function render(data) {
            const sorted = data.sort((a, b) => b.mttr_horas - a.mttr_horas);
            let sD = 0, sH = 0, nF = sorted.length, mE = {};
            let rD = { '>60d': 0, '45-60d': 0, '30-45d': 0, '15-30d': 0, '5-15d': 0, '<5d': 0 };
            dataFull.forEach(s => sD += s.disponibilidad);
            sorted.forEach(s => { 
                sH += s.mttr_horas; mE[s.ESTADO_OP] = (mE[s.ESTADO_OP] || 0) + 1;
                const d = s.mttr_horas / 24;
                if (d > 60) rD['>60d']++; else if (d > 45) rD['45-60d']++; else if (d > 30) rD['30-45d']++;
                else if (d > 15) rD['15-30d']++; else if (d > 5) rD['5-15d']++; else rD['<5d']++;
            });
            document.getElementById('t-sitios').innerText = dataFull.length;
            document.getElementById('d-global').innerText = (sD / (dataFull.length || 1)).toFixed(0) + "%";
            document.getElementById('t-falla').innerText = nF;
            document.getElementById('m-promedio').innerText = (sH / (nF || 1)).toFixed(0) + "h";
            document.getElementById('d-promedio').innerText = (sH / (nF || 1) / 24).toFixed(1) + "d";
            const tb = document.getElementById('b-tabla'); tb.innerHTML = "";
            sorted.forEach(s => {
                const tr = document.createElement('tr'); if (s.ID == selectedId) tr.className = 'selected';
                tr.onclick = () => { registrarEstado(); selectedId = s.ID; aplicarCambios(false); };
                tr.innerHTML = `<td>${s.ID}</td><td>${s.ALIADO}</td><td style="text-align:right;">${(s.mttr_horas/24).toFixed(1)}</td><td style="text-align:right;">${s.mttr_horas}</td><td>${s.STOPPER || "N/A"}</td><td>${s.OT_REL || "N/A"}</td><td>${s.PERFIL || "N/A"}</td>`;
                tb.appendChild(tr);
            });
            actCharts(mE, rD);
        }

        function actCharts(estados, dias) {
            if(chartEstado) chartEstado.destroy(); if(chartDias) chartDias.destroy();
            chartEstado = new Chart(document.getElementById('cEstadoOp'), {
                type: 'doughnut', data: { labels: Object.keys(estados), datasets: [{ data: Object.values(estados), backgroundColor: ['#D32F2F', '#1565C0', '#2E7D32', '#F9A825', '#6A1B9A', '#EF6C00'] }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } },
                    onClick: (e, el) => { if (el.length > 0) { registrarEstado(); currentEstadoFilter = chartEstado.data.labels[el[0].index]; aplicarCambios(false); } }
                }
            });

            chartDias = new Chart(document.getElementById('cDiasAfectacion'), {
                type: 'bar', data: { labels: Object.keys(dias), datasets: [{ data: Object.values(dias), backgroundColor: ['#7f0000', '#B71C1C', '#D32F2F', '#E64A19', '#F9A825', '#B0BEC5'] }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false },
                    // CONFIGURACIÓN DE ALTA VISIBILIDAD PARA DATALABELS
                    datalabels: {
                        display: true, // Mostrar los números
                        anchor: 'end', align: 'top', // Encima de la barra
                        color: '#D32F2F', // Rojo para que resalte
                        font: { size: 10, weight: 'bold' }, // Más grande y negrita
                        backgroundColor: 'rgba(255, 255, 255, 0.8)', // Fondo blanco para legibilidad
                        borderRadius: 3, padding: 2,
                        formatter: (value) => value > 0 ? value : '' // No mostrar ceros
                    }},
                    scales: { 
                        x: { ticks: { font: { size: 7.5, weight: 'bold' } } }, // Ejes más grandes
                        y: { beginAtZero: true, ticks: { font: { size: 8 } } } // Escala más grande
                    },
                    onClick: (e, el) => { if (el.length > 0) { registrarEstado(); currentDayFilter = chartDias.data.labels[el[0].index]; aplicarCambios(false); } }
                }
            });
        }

        function pasoAtras() {
            if (historial.length > 0) {
                const u = JSON.parse(historial.pop());
                for (let id in u.filtros) document.getElementById(id).value = u.filtros[id];
                selectedId = u.selectedId; currentEstadoFilter = u.currentEstadoFilter; currentDayFilter = u.currentDayFilter;
                aplicarCambios(false); if (historial.length === 0) document.getElementById('btn-return').disabled = true;
            }
        }

        function actualizarSelectores() {
            for (let target in filtrosIds) {
                const unicos = [...new Set(dataFull.map(i => i[filtrosIds[target]]))].filter(v => v).sort();
                const el = document.getElementById(target); const prev = el.value;
                el.innerHTML = '<option value="todos">Todos</option>';
                unicos.forEach(v => el.add(new Option(v, v))); el.value = prev || "todos";
            }
        }

        function buscarPorID() {
            const id = prompt("Ingrese ID:");
            if (id) { registrarEstado(); const s = dataFull.find(i => String(i.ID) === id.trim()); if (s) { selectedId = s.ID; aplicarCambios(false); } }
        }

        function exportarExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tSitios')), "Reporte.xlsx"); }
        init();
    </script>
</body>
</html>
